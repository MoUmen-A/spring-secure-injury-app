<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/style.css">
    <title>Sign Up</title>
</head>
<body>
<div>
    <h1>Sign Up</h1>
    <form action="/signup" method="post">
        <label for="username">Username:</label>
        <input type="text" minlength="5" id="username" name="username" required><br><br>
        <label for="password">Password:</label>
        <input type="password" minlength="6" id="password" name="password" required><br><br>
        <button class="btn" type="submit">Sign Up</button>
    </form>
    </div>
</body>
</html>
